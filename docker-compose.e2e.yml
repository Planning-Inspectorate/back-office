services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: ${LOCAL_SQL_PASSWORD:-P@ssw0rdPINS2026!}
    ports:
      - '${E2E_SQL_PORT:-14330}:1433'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - sqlserver
    environment:
      NODE_ENV: development
      GIT_SHA: local-e2e
      PORT: 3000
      DATABASE_URL: sqlserver://sqlserver:1433;database=pins_development;user=sa;password=${LOCAL_SQL_PASSWORD:-P@ssw0rdPINS2026!};trustServerCertificate=true
      QUERY_BATCH_SIZE: 2090
      VIRUS_SCANNING_DISABLED: 'true'
      AZURE_BLOB_STORE_HOST: blob-store-host
      AZURE_BLOB_STORE_CONTAINER: blob-store-container
      AUTH_DISABLED: 'true'
      SERVICE_BUS_ENABLED: 'false'
      KEY_VAULT_ENABLED: 'false'
      PINS_FEATURE_FLAG_AZURE_CONNECTION_STRING: ''
      STATIC_FEATURE_FLAGS_ENABLED: 'true'
      LOG_LEVEL_STDOUT: debug
    ports:
      - '${E2E_API_PORT:-3001}:3000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      NODE_ENV: local
      GIT_SHA: local-e2e
      AUTH_DISABLED: 'true'
      AUTH_DISABLED_GROUP_IDS: '*'
      APPLICATIONS_CASE_ADMIN_OFFICER_GROUP_ID: applications_case_admin_officer
      APPLICATIONS_CASETEAM_GROUP_ID: applications_case_team
      APPLICATIONS_INSPECTOR_GROUP_ID: applications_inspector
      API_HOST: http://api:3000
      APP_HOSTNAME: localhost:${E2E_WEB_PORT:-8080}
      HTTPS_ENABLED: 'false'
      HTTP_PORT: 8080
      LOG_LEVEL_STDOUT: debug
      SESSION_SECRET: local-e2e-session-secret
      DISABLE_REDIS: 'true'
      AZURE_BLOB_STORE_HOST: blob-store-host
      STATIC_FEATURE_FLAGS_ENABLED: 'true'
      PINS_FEATURE_FLAG_AZURE_CONNECTION_STRING: ''
      DUMMY_ADDRESS_DATA: 'true'
      DUMMY_USER_DATA: 'true'
      RETRY_MAX_ATTEMPTS: 3
      RETRY_STATUS_CODES: 500,501,502
    ports:
      - '${E2E_WEB_PORT:-8080}:8080'
    volumes:
      - ./apps/web/dummy_user_data.json:/usr/src/app/apps/web/dummy_user_data.json:ro
      - ./apps/web/dummy_address_data.json:/usr/src/app/apps/web/dummy_address_data.json:ro
