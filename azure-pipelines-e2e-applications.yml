parameters:
  - name: Environment
    type: string
    default: 'test'
    values:
      - 'dev'
      - 'test'

variables:
  - name: APP
    value: 'applications'
  - group: e2e-${{ parameters.Environment }}

pr: none

trigger: none

jobs:
  - job: Run_Cypress_Tests_For_Applications
    timeoutInMinutes: 60
    pool: pins-odt-agent-pool-tests

    steps:
      - task: Npm@1
        inputs:
          command: "install"
          workingDir: $(System.DefaultWorkingDirectory)/apps/e2e
        displayName: "Install Dependencies"

      # Smoke & Core Tests
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/smokeTests.spec.js cypress/e2e/createCase.spec.js cypress/e2e/editCase.spec.js cypress/e2e/search.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Smoke & Core Tests'

      # Team Management
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/addTeam.spec.js cypress/e2e/updateAndRemoveTeam.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Team Management Tests'

      # Representations
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/addRepresentation.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Representations Test'

      # Document Upload & Publishing
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/documentUpload.spec.js cypress/e2e/publishDocuments.spec.js cypress/e2e/unpublishDocuments.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Document Upload & Publishing Tests'

      # Document Properties
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/documentProperties.spec.js cypress/e2e/documentPropertiesWelsh.spec.js cypress/e2e/documentVersioning.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Document Properties Tests'

      # Folders & Structure
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/folders.spec.js cypress/e2e/sectorAsTraing.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Folder Structure Tests'

      # Project Lifecycle
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/projectUpdates.spec.js cypress/e2e/updateProjectInformation.spec.js cypress/e2e/keyDates.spec.js cypress/e2e/examTimetable.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Project Lifecycle Tests'

      # Search Features
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/searchDocuments.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Search Document Test'

      # Advice & Language Specific
      - task: ShellScript@2
        inputs:
          scriptPath: 'apps/e2e/run-tests.sh'
          args: 'cypress/e2e/s51Advice.spec.js cypress/e2e/welsh.spec.js'
        env:
          BASE_URL: $(BASE_URL)
          CASE_TEAM_EMAIL: $(CASE_TEAM_EMAIL)
          CASE_ADMIN_EMAIL: $(CASE_ADMIN_EMAIL)
          INSPECTOR_EMAIL: $(INSPECTOR_EMAIL)
          USER_PASSWORD: $(USER_PASSWORD)
          FEATURE_FLAG_CONNECTION_STRING: $(FEATURE_FLAG_CONNECTION_STRING)
        displayName: 'Run Advice & Welsh Tests'

      # Publish Failed Screenshots
      - task: PublishBuildArtifacts@1
        inputs:
          pathToPublish: 'apps/e2e/cypress/screenshots'
          artifactName: 'FailedTests'
        displayName: "Publish Failed Tests Artifacts"
        condition: failed()
